syntax = "proto3";

package todo;


service TodoService {
  rpc CreateTodo (CreateTodoRequest) returns (TodoResponse);
  rpc GetTodos (GetTodosRequest) returns (GetTodosResponse);
  rpc UpdateTodo (UpdateTodoRequest) returns (TodoResponse);
  rpc DeleteTodo (TodoIdRequest) returns (EmptyResponse);
  rpc ToggleTodo (TodoIdRequest) returns (TodoResponse);
}

message CreateTodoRequest {
  string title = 1;
  string userId = 2;
}

message GetTodosRequest {
  string userId = 1;
}

message UpdateTodoRequest {
  string id = 1;
  string title = 2;
}

message TodoIdRequest {
  string id = 1;
}

message TodoResponse {
  string id = 1;
  string title = 2;
  bool completed = 3;
}

message GetTodosResponse {
  repeated TodoResponse todos = 1;
}

message EmptyResponse {}